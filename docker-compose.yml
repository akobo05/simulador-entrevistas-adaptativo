services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: warachikuy
      POSTGRES_PASSWORD: warachikuy
      POSTGRES_DB: warachikuy
    # Sin mapeo de puerto al host: el servicio api lo accede por la red
    # interna de Docker. Para conectarse desde el host usa
    # `docker compose exec postgres psql -U warachikuy`.
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U warachikuy']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # Sin mapeo de puerto al host: el servicio api lo accede por la red
    # interna de Docker. Para conectarse desde el host usa
    # `docker compose exec redis redis-cli`.
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://warachikuy:warachikuy@postgres:5432/warachikuy
      REDIS_URL: redis://redis:6379
      # ${VAR:?msg} hace que `docker compose up` falle inmediatamente con
      # el mensaje indicado si la variable no esta definida o esta vacia.
      # Evita dos problemas: (1) arrancar el container y descubrir el
      # error recien cuando Zod valida adentro; (2) tomar silenciosamente
      # una GEMINI_API_KEY que el dev tenga exportada en su shell para
      # otro proyecto y filtrarla al container.
      GEMINI_API_KEY: ${GEMINI_API_KEY:?define GEMINI_API_KEY en .env de la raiz}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/workspace/apps/api/src
      - ./packages/shared-types/src:/workspace/packages/shared-types/src

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://localhost:3000
    depends_on:
      - api
    # Saltamos copy:wasm (el bind mount ya expone los .wasm) y ejecutamos
    # vite directamente, si no el mkdirSync falla por EPERM en la montura.
    command: ['npx', '--yes', 'vite', '--host', '0.0.0.0']
    volumes:
      - ./apps/web/src:/workspace/apps/web/src
      # mediapipe-wasm esta en .gitignore; ejecuta pnpm --filter @warachikuy/web copy:wasm
      # una vez despues de clonar para poblar esta carpeta.
      - ./apps/web/public:/workspace/apps/web/public
      - ./packages/shared-types/src:/workspace/packages/shared-types/src
      - ./packages/voice-pipeline/src:/workspace/packages/voice-pipeline/src

volumes:
  postgres-data:
